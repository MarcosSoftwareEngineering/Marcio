<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Márcio & Larissa Agnes ❤️</title>

<!-- ✅ Open Graph: URL absoluta obrigatória para preview funcionar -->
<meta property="og:title" content="Márcio & Larissa Agnes ❤️" />
<meta property="og:description" content="Nossa História ♡" />
<meta property="og:image" content="https://MarcosSoftwareEngineering.github.io/Marcio/img/Marcio.001.jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://MarcosSoftwareEngineering.github.io/Marcio/" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Márcio & Larissa Agnes ❤️" />
<meta name="twitter:description" content="Nossa História ♡" />
<meta name="twitter:image" content="https://MarcosSoftwareEngineering.github.io/Marcio/img/Marcio.001.jpeg" />

<style>
  :root {
    --bg-center: #1a0020;
    --bg-edge: #0a0010;
    --text-gold: #ffd700;
    --border-glow: rgba(255, 150, 180, 0.6);
    --shadow-glow: rgba(255, 50, 100, 0.8);
    --carousel-width: min(88vw, 320px); 
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: radial-gradient(ellipse at center, var(--bg-center) 0%, var(--bg-edge) 100%);
    overflow: hidden;
    font-family: Georgia, serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  canvas { position: fixed; top: 0; left: 0; z-index: 10; pointer-events: none; }
  
  #reveal {
    position: relative;
    z-index: 20;
    text-align: center;
    opacity: 0;
    transform: scale(0.3);
    transition: opacity 2s ease, transform 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  
  #reveal.show { opacity: 1; transform: scale(1); pointer-events: auto; }

  .gallery-container { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }

  .nav-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glow);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    border-radius: 50%;
    width: 45px; height: 45px;
    display: flex; justify-content: center; align-items: center;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(255, 50, 100, 0.2);
    flex-shrink: 0;
  }

  .nav-btn:hover { background: rgba(255, 50, 100, 0.4); transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 50, 100, 0.6); }
  .nav-btn:active { transform: scale(0.95); }
  
  .carousel-wrapper {
    width: var(--carousel-width);
    overflow: hidden;
    position: relative;
    border-radius: 16px;
    box-shadow: 0 0 30px var(--shadow-glow), 0 0 80px rgba(255, 50, 100, 0.3);
    border: 3px solid var(--border-glow);
  }

  .carousel-track {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  
  .carousel-track::-webkit-scrollbar { display: none; }
  
  .carousel-track img {
    flex: 0 0 100%; width: 100%;
    scroll-snap-align: center;
    object-fit: cover;
    aspect-ratio: 3 / 4;
    object-position: top center;
    display: block;
    pointer-events: none;
  }

  #title {
    font-size: clamp(1.6rem, 5vw, 2.5rem);
    color: var(--text-gold);
    text-shadow: 0 0 20px rgba(255,200,0,0.9), 0 0 50px rgba(255,100,0,0.5);
    font-style: italic;
    letter-spacing: 2px;
  }
  
  #subtitle { color: rgba(255,200,220,0.75); font-size: 0.85rem; margin-top: 6px; letter-spacing: 4px; text-transform: uppercase; }
  
  #boom {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 18vw, 10rem);
    z-index: 30; pointer-events: none;
    animation: heartbeat 0.6s ease-in-out infinite;
  }
  
  @keyframes heartbeat {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="boom">❤️</div>

<div id="reveal">
  <div class="gallery-container">
    <button id="prevBtn" class="nav-btn" aria-label="Foto Anterior">◀</button>
    <div class="carousel-wrapper">
      <div class="carousel-track" id="carousel-track"></div>
    </div>
    <button id="nextBtn" class="nav-btn" aria-label="Próxima Foto">▶</button>
  </div>
  <div id="title">Márcio & Larissa Agnes ♡</div>
  <div id="subtitle">Nossa História</div>
</div>

<script>
const CONFIG = {
  maxFireworks: 20, 
  fireworkInterval: 300,
  particlesPerBurst: 45,
  delayBeforeReveal: 600,
  totalImages: 9, 
  colors: ['#ff4080', '#ff80b0', '#ffd700', '#ff6eb4', '#ffffff', '#ff1493', '#ffb6c1', '#ff69b4', '#f0a', '#fa0']
};

const populateCarousel = () => {
  const track = document.getElementById('carousel-track');
  for (let i = 1; i <= CONFIG.totalImages; i++) {
    const img = document.createElement('img');
    const fileNumber = String(i).padStart(3, '0');
    const prefix = (i === 8) ? 'marcio' : 'Marcio';
    img.src = `./img/${prefix}.${fileNumber}.jpeg`;
    img.alt = `Momento ${i}`;
    img.onerror = () => { img.src = './img/Marcio.001.jpeg'; img.onerror = null; };
    track.appendChild(img);
  }
};

populateCarousel();

const track = document.getElementById('carousel-track');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

nextBtn.addEventListener('click', () => { track.scrollBy({ left: track.clientWidth, behavior: 'smooth' }); });
prevBtn.addEventListener('click', () => { track.scrollBy({ left: -track.clientWidth, behavior: 'smooth' }); });

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const boomElement = document.getElementById('boom');
const revealElement = document.getElementById('reveal');
const particles = [];

const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.addEventListener('resize', resize);
resize();

class Particle {
  constructor(x, y, isExplosion) {
    this.x = x; this.y = y; this.isExplosion = isExplosion;
    const angle = Math.random() * Math.PI * 2;
    const speed = isExplosion ? (3 + Math.random() * 10) : (1 + Math.random() * 2);
    this.vx = Math.cos(angle) * speed;
    this.vy = isExplosion ? (Math.sin(angle) * speed - 3) : -(2 + Math.random() * 4);
    this.size = isExplosion ? (8 + Math.random() * 20) : (6 + Math.random() * 12);
    this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
    this.alpha = 1;
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.15;
    this.isHeart = Math.random() > 0.45;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.alpha -= 0.007; this.rot += this.rotV; }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.fillStyle = this.color;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    if (this.isHeart) {
      const s = this.size;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.2);
      ctx.bezierCurveTo(s * 0.5, -s * 0.75, s * 1.0, s * 0.15, 0, s * 0.65);
      ctx.bezierCurveTo(-s * 1.0, s * 0.15, -s * 0.5, -s * 0.75, 0, -s * 0.2);
      ctx.fill();
    } else {
      ctx.fillRect(-this.size * 0.4, -this.size * 0.2, this.size * 0.8, this.size * 0.35);
    }
    ctx.restore();
  }
}

const createBurst = (x, y, amount) => { for (let i = 0; i < amount; i++) particles.push(new Particle(x, y, true)); };

const renderLoop = () => {
  requestAnimationFrame(renderLoop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update(); p.draw();
    if (p.alpha <= 0 || p.y > canvas.height + 60) particles.splice(i, 1);
  }
};

const initAnimationSequence = () => {
  let fireworkCount = 0;
  const fwInterval = setInterval(() => {
    createBurst(Math.random() * canvas.width, Math.random() * (canvas.height * 0.65), CONFIG.particlesPerBurst);
    fireworkCount++;
    if (fireworkCount >= CONFIG.maxFireworks) {
      clearInterval(fwInterval);
      setTimeout(() => {
        boomElement.style.display = 'none';
        revealElement.classList.add('show');
        setInterval(() => { if (Math.random() > 0.35) particles.push(new Particle(Math.random() * canvas.width, canvas.height + 10, false)); }, 55);
        window.addEventListener('click', (e) => { if(!e.target.closest('.gallery-container')) createBurst(e.clientX, e.clientY, 40); });
      }, CONFIG.delayBeforeReveal);
    }
  }, CONFIG.fireworkInterval);
  renderLoop();
};

initAnimationSequence();
</script>
</body>
</html>
